# Component groups (a "project" in product terms, e.g. Acme, made of many repos).
# A group expands to its component projects (each its own git repo). The `hub` is
# the project where group-level planning runs (used from E2 onward).
groups:
  acme:
    description: The Acme product — all components, each its own repo.
    hub: acme-api
    components:
      - acme-web
      - acme-worker
