name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install project + dev extras
        run: pip install -e ".[dev]"

      - name: ruff check
        run: ruff check .

      - name: ruff format check
        run: ruff format --check .

  typecheck:
    name: Typecheck (mypy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install project + dev extras
        run: pip install -e ".[dev]"

      - name: mypy
        run: python -m mypy hivepilot tests

  test:
    name: Test (pytest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install project + dev extras
        # dev extra includes fastapi, uvicorn, prometheus-client, itsdangerous,
        # httpx — all needed so the full 675-test suite runs without skips/errors.
        # notifications (python-telegram-bot) is also required for telegram tests.
        run: pip install -e ".[dev,notifications]"

      - name: pytest
        run: python -m pytest -q

  public-safe:
    name: Public-safe prompts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Check public prompts for org-specific content
        run: python scripts/check_public_safe.py

  webui-build:
    name: Mirador web UI build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node (pinned via web/.nvmrc)
        uses: actions/setup-node@v4
        with:
          node-version-file: web/.nvmrc
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install web dependencies
        run: npm ci
        working-directory: web

      - name: Build Mirador web UI
        run: npm run build
        working-directory: web

      - name: Fail if committed static/ is stale vs the source build
        run: git diff --exit-code hivepilot/webui/static

  helm-lint:
    name: Helm chart lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.14.4

      - name: helm lint
        run: helm lint deploy/helm/hivepilot

      - name: helm template (default values)
        run: helm template deploy/helm/hivepilot > /dev/null

      - name: helm template (gated paths — ingress, bots, rbac)
        run: |
          helm template deploy/helm/hivepilot \
            --set ingress.enabled=true \
            --set bots.telegram.enabled=true \
            --set bots.slack.enabled=true \
            --set bots.discord.enabled=true \
            --set rbac.create=true \
            --set rbac.scope=ClusterRole \
            --set 'config.files.projects\.yaml=projects: {}' \
            --set secrets.apiTokensYaml="tokens: []" \
            --set secrets.data.HIVEPILOT_API_TOKEN=placeholder \
            > /dev/null
