# HivePilot — Role → Runner + Model bindings (Sprint 2.1)
#
# Documentary source of truth for the per-role runner/model mapping.
# The authoritative runtime values live in hivepilot/roles.py (ROLES dict);
# this file mirrors them for human review and future loader use.
# No OpenRouter — GLM/Kimi/Qwen are reached via the `opencode` runner + model arg.
#
# Schema per role:
#   runner: <registered runner name in hivepilot/registry.py RUNNER_MAP>
#   model:  <single model arg passed to the runner>           (optional)
#   models: [<model>, <model>]  # dual-model (debate) — CEO only (optional)

roles:
  ceo:
    runner: opencode
    models: [qwen, kimi]   # DUAL — for debate
  chief_of_staff:
    runner: cursor
  cto:
    runner: opencode
    model: kimi
  developer:
    runner: claude
  reviewer:
    runner: codex
  ciso:
    runner: opencode
    model: glm
  qa:
    runner: gemini
  documentation:
    runner: gemini

# Fallback implementation runner (used when a stage has no role binding).
fallback:
  runner: cursor
