[build-system]
requires = ["setuptools>=70", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "hivepilot"
version = "0.1.0"
description = "AI orchestration for development projects"
readme = "README.md"
requires-python = ">=3.10"
dependencies = [
  "typer>=0.16,<1.0",
  "rich>=14.0,<15.0",
  "pydantic>=2.8,<3.0",
  "pydantic-settings>=2.3,<3.0",
  "PyYAML>=6.0,<7.0",
]

[project.scripts]
hivepilot = "hivepilot.cli:app"

[tool.setuptools]
include-package-data = true

[tool.setuptools.packages.find]
include = ["hivepilot*"]
