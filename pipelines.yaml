pipelines:
  company:
    description: >
      Full company pipeline: CEO intake through Chief of Staff planning, CTO
      technical review, Developer implementation, Reviewer code review, CISO
      security clearance, QA validation, Documentation update, Chief of Staff
      report, and final CEO approval.
    stages:
      - name: CEO Intake
        task: company-ceo-intake
      - name: Chief of Staff Plan
        task: company-cos-plan
      - name: CTO Review
        task: company-cto-review
      - name: Implementation
        task: company-developer
        pause_before: true   # human approves the plan before the developer codes
      - name: Review
        task: company-reviewer
      - name: Security
        task: company-ciso
      - name: QA
        task: company-qa
      - name: Documentation
        task: company-documentation
      - name: Report
        task: company-cos-report
      - name: Approval
        task: company-ceo-approval

  company-v2:
    description: >
      Reordered company cycle. Planning phase (CEO debate -> CTO architecture ->
      CISO architecture security -> Chief of Staff synthesis) ends with a human
      plan checkpoint; then development, review (opens PR), CISO code clearance,
      QA, documentation, and a final Chief of Staff PR approval.
    stages:
      - name: CEO Intake
        task: company-ceo-intake
      - name: CTO Architecture
        task: company-cto-review
      - name: Security (architecture)
        task: company-ciso
      - name: Plan Synthesis
        task: company-cos-synthesis
      - name: Implementation
        task: company-developer
        pause_before: true
      - name: Review
        task: company-reviewer
      - name: Security (code)
        task: company-ciso
      - name: QA
        task: company-qa
      - name: Documentation
        task: company-documentation
      - name: PR Approval
        task: company-cos-pr-approval

  pentest-fix-review:
    description: Run a security review, refactor fixes, then refresh docs.
    stages:
      - name: pentest
        task: pentest
      - name: refactor follow-up
        task: refactor
      - name: docs summary
        task: docs

  gh-repo-init:
    description: Ensure GitHub repository exists and push current branch.
    stages:
      - name: initialize repo
        task: gh-repo-init-task
