{{- if .Values.api.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "hivepilot.componentName" (dict "context" . "component" "api") }}
  labels:
    {{- include "hivepilot.labels" . | nindent 4 }}
    app.kubernetes.io/component: api
  {{- with .Values.service.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "hivepilot.componentSelectorLabels" (dict "context" . "component" "api") | nindent 4 }}
{{- end }}
