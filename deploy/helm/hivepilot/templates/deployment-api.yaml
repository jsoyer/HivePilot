{{/*
HivePilot API server. Single replica: SQLite state.db is not multi-writer
safe (see README "Single-replica & HA caveat" and hivepilot's own
`api serve --workers` warning in hivepilot/cli.py). Do not add a
`replicaCount` value here — scaling this Deployment is unsupported until an
external DB backend (HIVEPILOT_DATABASE_URL=postgresql://...) is configured.
*/}}
{{- if .Values.api.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "hivepilot.componentName" (dict "context" . "component" "api") }}
  labels:
    {{- include "hivepilot.labels" . | nindent 4 }}
    app.kubernetes.io/component: api
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      {{- include "hivepilot.componentSelectorLabels" (dict "context" . "component" "api") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "hivepilot.componentSelectorLabels" (dict "context" . "component" "api") | nindent 8 }}
        {{- with .Values.api.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- with .Values.api.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      serviceAccountName: {{ include "hivepilot.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: api
          image: {{ include "hivepilot.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          {{- with .Values.api.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          command: ["hivepilot"]
          args:
            - api
            - serve
            - --host
            - "0.0.0.0"
            - --port
            - {{ .Values.api.port | quote }}
            {{- range .Values.api.extraArgs }}
            - {{ . | quote }}
            {{- end }}
          ports:
            - name: http
              containerPort: {{ .Values.api.port }}
              protocol: TCP
          env:
            - name: HIVEPILOT_STATE_DB
              value: "state-data/state.db"
            - name: HIVEPILOT_RUNS_DIR
              value: "state-data/runs"
            - name: HIVEPILOT_LOGS_DIR
              value: "state-data/runs/logs"
            - name: HIVEPILOT_ENABLE_WEBUI
              value: {{ .Values.env.enableWebui | quote }}
            - name: HIVEPILOT_ENABLE_TEXTUAL_UI
              value: {{ .Values.env.enableTextualUi | quote }}
            - name: HIVEPILOT_LOG_TO_FILE
              value: {{ .Values.env.logToFile | quote }}
            {{- with .Values.api.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          envFrom:
            - secretRef:
                name: {{ include "hivepilot.secretName" . }}
            {{- with .Values.api.extraEnvFrom }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          livenessProbe:
            httpGet:
              path: {{ .Values.probes.liveness.path }}
              port: http
            initialDelaySeconds: {{ .Values.probes.liveness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.liveness.periodSeconds }}
            timeoutSeconds: {{ .Values.probes.liveness.timeoutSeconds }}
            failureThreshold: {{ .Values.probes.liveness.failureThreshold }}
          readinessProbe:
            httpGet:
              path: {{ .Values.probes.readiness.path }}
              port: http
            initialDelaySeconds: {{ .Values.probes.readiness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.readiness.periodSeconds }}
            timeoutSeconds: {{ .Values.probes.readiness.timeoutSeconds }}
            failureThreshold: {{ .Values.probes.readiness.failureThreshold }}
          resources:
            {{- toYaml .Values.api.resources | nindent 12 }}
          volumeMounts:
            - name: state
              mountPath: /app/state-data
            {{- include "hivepilot.configVolumeMounts" . | nindent 12 }}
            {{- with .Values.api.extraVolumeMounts }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
      volumes:
        {{- include "hivepilot.stateVolume" . | nindent 8 }}
        {{- include "hivepilot.configVolumes" . | nindent 8 }}
        {{- with .Values.api.extraVolumes }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- with .Values.api.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.api.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.api.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
