{{- if .Values.api.enabled }}
apiVersion: v1
kind: Pod
metadata:
  name: {{ include "hivepilot.fullname" . }}-test-connection
  labels:
    {{- include "hivepilot.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": test
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  restartPolicy: Never
  containers:
    - name: curl
      image: curlimages/curl:8.10.1
      command:
        - sh
        - -c
        - >-
          curl -sf
          http://{{ include "hivepilot.componentName" (dict "context" . "component" "api") }}:{{ .Values.service.port }}/healthz
{{- end }}
