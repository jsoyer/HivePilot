{{- if not .Values.secrets.existingSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "hivepilot.secretName" . }}
  labels:
    {{- include "hivepilot.labels" . | nindent 4 }}
type: Opaque
stringData:
  # Hashed API tokens (never plaintext) mounted at /app/api_tokens.yaml. Empty
  # by default — see README "Bootstrap the first admin token".
  api_tokens.yaml: {{ .Values.secrets.apiTokensYaml | quote }}
  {{- range $key, $value := .Values.secrets.data }}
  {{ $key }}: {{ $value | quote }}
  {{- end }}
{{- end }}
