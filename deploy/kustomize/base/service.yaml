# ClusterIP Service fronting the API Deployment. Exposes /v1/* (control
# API), /metrics (Prometheus), /ui (Mirador web UI, opt-in via
# HIVEPILOT_ENABLE_WEBUI), and the unauthenticated /healthz + /readyz probes.
apiVersion: v1
kind: Service
metadata:
  name: hivepilot-api
  labels:
    app.kubernetes.io/component: api
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/component: api
  ports:
    - name: http
      port: 8045
      targetPort: http
      protocol: TCP
